<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Detection</title>
</head>
<body>
  <header class="bg-gray-800 text-white flex justify-between p-4">
    <h1 class="text-xl font-bold">AI Detection</h1>
    <nav class="flex space-x-4">
      <a href="#" class="hover:text-gray-400">Home</a>
      <a href="#" class="hover:text-gray-400">About</a>
      <a href="#" class="hover:text-gray-400">Contact</a>
    </nav>
  </header>

  <main class="container mx-auto py-12 px-4">
    <section class="flex flex-col md:flex-row md:space-x-8">
      <div class="w-full md:w-1/2 mb-8 md:mb-0">
        <h2 class="text-2xl font-bold mb-4">Detect AI with ease</h2>
        <p class="text-gray-700">Upload an image or enter a URL to see if it's AI-generated.</p>
        <div class="flex flex-col space-y-4">
          <div class="flex items-center">
            <input type="file" id="image-upload" class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            <label for="image-upload" class="ml-2 text-blue-500 hover:text-blue-700">Upload Image</label>
          </div>
          <div class="flex items-center">
            <input type="text" id="image-url" class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter Image URL">
            <button id="check-url" class="ml-2 bg-blue-500 text-white py-1 px-4 rounded hover:bg-blue-700">Check URL</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="bg-gray-800 text-white text-center p-4">
    <p>Copyright &copy; 2024 AI Detection</p>
  </footer>
</body>
</html>
